name: Build and publish to FlakeHub

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            system: x86_64-linux
          - os: macos-15
            system: aarch64-darwin
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: true
      - uses: DeterminateSystems/flakehub-cache-action@main
      - run: nix develop -c true
      # Run the project gate (treefmt format check + PHP test suites) on Linux
      # only — the suite spins PHP servers + curl, validated on x86_64-linux.
      # macOS still validates the devShell builds via `nix develop -c true`.
      - if: matrix.system == 'x86_64-linux'
        run: nix develop -c just

  flakehub-publish:
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: true
      - uses: DeterminateSystems/flakehub-push@main
        with:
          name: "friedenberg/linenisgreat"
          rolling: true
          visibility: "public"
          include-output-paths: true
