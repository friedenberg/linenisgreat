# Repository-local treefmt config. The eng `treefmt` wrapper (on PATH via
# home-manager) detects this file at the git root and runs plain treefmt against
# it, resolving formatters from PATH — so flake.nix's devShell carries
# php-cs-fixer / nixfmt / shfmt / prettier / jq. Run via `just codemod-fmt`.
#
# INTERIM: PHP is formatted locally until amarbel-llc/eng#125 adds php-cs-fixer
# to the shared treefmt.nix; then this file + the local formatter devShell deps
# can be dropped in favour of eng's baked config.

[global]
excludes = [
  "**/vendor/**",
  "flake.lock",
  "**/composer.lock",
  # Generated / large committed data. code.json's sorted-key form is owned by
  # `just build-code-github`; jq would thrash it and the bulk yoga/cocktails data.
  "api/protected/data/**",
  "app/public/*.json",
  "app/public/.htaccess",
  # Mustache templates are not valid HTML for prettier.
  "**/*.html.mustache",
  # Binary / image assets.
  "*.png",
  "*.jpg",
  "*.jpeg",
  "*.gif",
  "*.svg",
  "*.ico",
  "*.pdf",
]

# php-cs-fixer rejects multiple path args without a --config; the committed
# .php-cs-fixer.dist.php supplies it (rules live there), so treefmt can batch
# all PHP files into one invocation.
[formatter.php]
command = "php-cs-fixer"
options = ["fix", "--config=.php-cs-fixer.dist.php", "--using-cache=no", "--quiet"]
includes = ["*.php"]

[formatter.nixfmt]
command = "nixfmt"
includes = ["*.nix"]

[formatter.shfmt]
command = "shfmt"
options = ["-w", "-i", "2", "-s"]
includes = ["*.sh", "*.bash", "*.bats"]

[formatter.prettier]
command = "prettier"
options = ["--write"]
includes = ["*.css", "*.scss", "*.yaml", "*.yml"]

# JSON via `jq .` (no native in-place mode; tempfile round-trip), mirroring eng's
# treefmt.nix. The bulk data files are excluded globally above, so this covers
# composer.json and other small source JSON.
[formatter.jq]
command = "bash"
options = [
  "-euc",
  'for f in "$@"; do tmp=$(mktemp "${f}.XXXXXX"); jq . "$f" > "$tmp" && mv "$tmp" "$f"; done',
  "--",
]
includes = ["*.json"]
